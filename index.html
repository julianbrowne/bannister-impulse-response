<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bannister Impulse Response – 10k Runner</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="img/app.png">
</head>
<body>
  <div class="page-wrap">
    <div class="test-links">
      <a href="test/index.html"><img src="img/test.png" alt="Run tests"></a>
      <a href="doc/SystemsModelEffectTraining.pdf"><img src="img/pdf.png" alt="Calvert et al. 1976"></a>
    </div>
    <h2>Bannister Impulse Response – 10k Runner</h2>

    <div class="bir-wrap">
      <div class="bir-scenario">
        <button class="bir-btn active" onclick="setScenario('steady')">Steady build</button>
        <button class="bir-btn" onclick="setScenario('taper')">Race taper</button>
        <button class="bir-btn" onclick="setScenario('overreach')">Overtraining</button>
        <button class="bir-btn" onclick="setScenario('rest')">Long rest</button>
        <div class="bir-profile">
          <label class="bir-profile-label"><input type="radio" name="profile" value="athlete" checked onchange="setProfile(this.value)"> Athlete</label>
          <label class="bir-profile-label"><input type="radio" name="profile" value="novice"  onchange="setProfile(this.value)"> Novice</label>
        </div>
      </div>

      <div class="bir-legend">
        <span><span class="bir-dot bir-dot--fit"></span>Fitness</span>
        <span><span class="bir-dot bir-dot--fat"></span>Fatigue</span>
        <span><span class="bir-dot bir-dot--perf"></span>Readiness (fitness − fatigue)</span>
      </div>

      <div class="chart-container">
        <canvas id="birChart"></canvas>
      </div>
      <p class="bir-annotation" id="birNote">Fitness builds slowly over weeks. Fatigue spikes fast then clears within days.</p>

      <div class="bir-events" id="birEvents"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script type="module" src="js/bir.js"></script>
</body>
</html>
